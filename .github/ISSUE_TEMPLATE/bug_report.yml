name: Bug report
description: Report a reproducible problem in Furu
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please include enough detail for us to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Connect ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: e.g. v0.1.0 or commit SHA
  - type: input
    id: firmware
    attributes:
      label: Watch firmware
      placeholder: e.g. InfiniTime 1.x, Kongle, Wasp-os
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device + OS details.
      placeholder: Android/iOS/Desktop version, phone model, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or screenshots if available.
